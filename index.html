<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>😄 Random Joke Generator</h1>
            
            <div class="joke-container">
                <p id="jokeText" class="joke-text">Click the button to get a joke!</p>
            </div>
            
            <button id="jokeBtn" class="btn">Get a Joke</button>
            <button id="shareBtn" class="btn btn-secondary">Share Joke</button>
            
            <div id="loading" class="loading" style="display: none;">
                <span class="spinner"></span>
                <p>Loading joke...</p>
            </div>
            
            <p id="errorMsg" class="error" style="display: none;"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
